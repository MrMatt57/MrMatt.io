baseURL = "https://mrmatt.io/"
languageCode = "en-us"
title = "Matt Walker"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
enableGitInfo = true

[frontmatter]
  lastmod = [":git", "lastmod", "date"]

[params]
  env = "production"
  description = "Matt Walker's personal site — writing about software engineering, AI, cloud infrastructure, photography, homelab projects, and hobbies from the Baltimore/DC area."
  keywords = ["software engineering", "AI", "cloud infrastructure", "photography", "homelab", "Hugo", "Matt Walker"]
  images = ["/images/MattWalker-avatar.png"]
  defaultTheme = "auto"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  comments = false
  ShowBreadCrumbs = false
  hideAuthor = false
  ShowToc = true

  [params.author]
    name = "Matt Walker"

  [params.schema]
    publisherType = "Person"
    sameAs = ["https://github.com/MrMatt57", "https://www.linkedin.com/in/mrmatt"]

  # Search engine verification tags — register at each console, get the HTML
  # tag verification code, paste the content="" value below, and redeploy.
  # Google: https://search.google.com/search-console → Add Property → HTML tag
  # Bing:   https://www.bing.com/webmasters → Add Site → HTML meta tag
  [params.analytics.google]
    SiteVerificationTag = ""
  [params.analytics.bing]
    SiteVerificationTag = ""

[[menu.main]]
  name = "Journal"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "Photography"
  url = "/photography/"
  weight = 15

[[menu.main]]
  name = "Now"
  url = "/now/"
  weight = 20

[[menu.main]]
  name = "Gear"
  url = "/gear/"
  weight = 30

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false
    noClasses = false
