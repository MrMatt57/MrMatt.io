name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: resources
          key: hugo-resources-${{ hashFiles('content/photography/**') }}
          restore-keys: |
            hugo-resources-

      - name: Build
        run: hugo --minify

      - name: Generate CSP headers
        run: node scripts/generate-headers.js

      - name: Build Cloudflare Functions
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages functions build --outdir=public

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=mrmatt-io --commit-dirty=true

      - name: Ping search engines
        if: github.ref == 'refs/heads/main'
        run: |
          # Notify Google of updated sitemap
          curl -s "https://www.google.com/ping?sitemap=https://mrmatt.io/sitemap.xml" > /dev/null

          # Notify search engines via IndexNow (Bing, Yandex, Seznam, Naver)
          CHANGED_URLS=$(git diff --name-only HEAD~1 HEAD -- content/ \
            | sed 's|^content/||; s|/index\.md$|/|; s|\.md$|/|; s|_index\.md$||' \
            | grep -v '^$' \
            | head -100 \
            | jq -R -s 'split("\n") | map(select(length > 0) | "https://mrmatt.io/" + .)' \
          )
          if [ "$CHANGED_URLS" != "[]" ] && [ -n "$CHANGED_URLS" ]; then
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              -d "{
                \"host\": \"mrmatt.io\",
                \"key\": \"9e1b6b753f2348b1a1cd666a37ef7988\",
                \"urlList\": $CHANGED_URLS
              }" > /dev/null || true
          fi

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags
          DATE=$(date -u +%Y.%m.%d)
          LAST=$(git tag -l "${DATE}.*" | sort -t. -k4 -n | tail -1)
          if [ -z "$LAST" ]; then
            VERSION="${DATE}.1"
          else
            N=$(echo "$LAST" | awk -F. '{print $NF}')
            VERSION="${DATE}.$((N + 1))"
          fi
          gh release create "$VERSION" \
            --generate-notes \
            --title "$VERSION" \
            --target "$GITHUB_SHA"
