{{- $related := site.RegularPages.Related . | first 3 }}
{{- if $related }}
<hr class="related-divider" />
<section class="related-posts">
    <h3>Related Posts</h3>
    <ul>
        {{- range $related }}
        <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            <span class="date">{{ .Date.Format "January 2, 2006" }}</span>
        </li>
        {{- end }}
    </ul>
</section>
{{- end }}
